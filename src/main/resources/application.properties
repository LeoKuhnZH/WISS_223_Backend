spring.application.name=Quiz Backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5434/quiz_multiuser_app
spring.datasource.username=quiz_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.config.import=optional:file:.env[.properties]

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool (Optional - fuer Performance)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Server Configuration
server.port=8080

# logging.level.org.springframework.beans=DEBUG
# logging.level.org.springframework.context=DEBUG

# ========================================
# JWT Configuration
# ========================================

# Secret Key f³r JWT Signatur
# WICHTIG: In Production als Environment Variable!
# Mindestens 256 Bit (32 Zeichen) f³r HS256
jwt.secret=${JWT_SECRET}

# Token G³ltigkeit in Millisekunden
# 86400000 ms = 24 Stunden = 60*60*24*1000
jwt.expiration=86400000